# =================================================================
# FILE: .github/workflows/build-debug.yml
# MỤC ĐÍCH: Build APK v11 từ GitLab, ký debug mặc định
# OUTPUT:   bitcoin-wallet-v11-debug.apk
# =================================================================

name: Build Bitcoin Wallet - v11

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ----- BƯỚC 1: Lấy mã nguồn từ GitLab (đã import) -----
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          # nếu bạn import GitLab vào repo này, dùng tag v11.02
          ref: v11.02
          fetch-depth: 1

      # ----- BƯỚC 2: Cài JDK 17 (v11 yêu cầu Java 17) -----
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ----- BƯỚC 3: Cài Android SDK 34 -----
      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ----- BƯỚC 4: Chỉ fix Guava (không ép AndroidX) -----
      - name: Fix Guava conflict
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/fix-guava.gradle <<'EOF'
          allprojects {
            configurations.all {
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                force 'com.google.guava:listenablefuture:9999.0-empty-to-avoid-conflict-with-guava'
              }
            }
          }
          EOF

      # ----- BƯỚC 5: Build APK debug (dùng Gradle wrapper của dự án) -----
      - name: Build prodDebug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew :wallet:assembleProdDebug --no-daemon --stacktrace

      # ----- BƯỚC 6: Xác minh chữ ký debug -----
      - name: Verify debug certificate
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          echo "=== Verify APK ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs "$APK_PATH"

      # ----- BƯỚC 7: Đổi tên -----
      - name: Rename APK
        run: |
          APK_PATH=$(find wallet/build/outputs/apk/prod/debug -name "*.apk" | head -1)
          mv "$APK_PATH" "$(dirname $APK_PATH)/bitcoin-wallet-v11-debug.apk"

      # ----- BƯỚC 8: Upload artifact -----
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: v11-debug-apk
          path: wallet/build/outputs/apk/prod/debug/bitcoin-wallet-v11-debug.apk