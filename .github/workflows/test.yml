name: Build Bitcoin Wallet v11.04 - Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build with Docker (BuildKit)
        run: |
          # v11.04 dùng cache mounts nên bắt buộc BuildKit
          DOCKER_BUILDKIT=1 docker build \
            --file build.Containerfile \
            --target export-stage \
            --output type=local,dest=out \
            .

      - name: List APKs
        run: |
          echo "APKs built:"
          find out -name "*.apk" -ls

      - name: Upload artifact (unsigned)
        uses: actions/upload-artifact@v6.0.0
        with:
          name: bitcoin-wallet-v11.04-unsigned
          path: out/*.apk