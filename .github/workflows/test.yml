# =================================================================
# FILE: .github/workflows/build-reproducible.yml
# MỤC ĐÍCH: Mô phỏng Dockerfile build reproducible trên GitHub Actions
#            (cài Gradle toàn cục, dùng Android SDK từ runner)
# =================================================================

name: Reproducible Build (Dockerfile style)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ----- CÀI GRADLE TOÀN CỤC (giống Dockerfile) -----
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          # Xác nhận
          gradle --version

      # ----- BUILD APK (dùng gradle toàn cục, không cần wrapper) -----
      - name: Build release APKs (assembleRelease)
        run: |
          # Build tất cả các bản release (devRelease, prodRelease)
          gradle :wallet:assembleRelease --no-daemon --stacktrace
          # Nếu muốn build cả 4 loại, thay dòng trên bằng:
          # gradle :wallet:assembleDevDebug :wallet:assembleDevRelease :wallet:assembleProdDebug :wallet:assembleProdRelease --no-daemon --stacktrace

      - name: List generated APKs
        run: |
          find wallet/build/outputs/apk -name "*.apk" -type f

      - name: Upload unsigned APKs
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-apks
          path: |
            wallet/build/outputs/apk/**/*.apk