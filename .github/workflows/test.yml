name: Reproducible Build (All Networks)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ----- JDK 17 để chạy sdkmanager (action setup-android yêu cầu) -----
      - name: Setup JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ----- Chuyển về JDK 11 để build (phù hợp với sourceCompatibility 1.8) -----
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # ----- Cài Gradle 6.9.4 (đúng yêu cầu của project) -----
      - name: Install Gradle 6.9.4
        run: |
          wget https://services.gradle.org/distributions/gradle-6.9.4-bin.zip
          unzip -q gradle-6.9.4-bin.zip -d /opt
          echo "/opt/gradle-6.9.4/bin" >> $GITHUB_PATH
          gradle --version

      # ----- Tạo các thư mục sourceSets nếu chưa có (tránh lỗi resource) -----
      - name: Ensure source set directories exist
        run: |
          mkdir -p wallet/res-mainnet wallet/assets-mainnet
          mkdir -p wallet/res-signet wallet/assets-signet

      # ----- Build tất cả 6 APK (3 flavors × 2 build types) -----
      - name: Build all APK variants
        run: |
          gradle :wallet:assemble --no-daemon --stacktrace

      - name: List generated APKs
        run: |
          find wallet/build/outputs/apk -name "*.apk" -type f

      # ----- Upload unsigned APKs (đã được ký bằng debug key) -----
      - name: Upload unsigned APKs
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-all-networks
          path: |
            wallet/build/outputs/apk/**/*.apk