name: Build Wallet 10.x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v11.02
          fetch-depth: 1

      # SDK cần JDK 17
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-30 build-tools;30.0.3'

      # Build cần JDK 11 + Gradle 6.9.4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - run: |
          mkdir -p ~/.gradle/init.d
          echo "allprojects{configurations.all{resolutionStrategy{force 'com.google.guava:guava:31.1-android'}}}" > ~/.gradle/init.d/fix.gradle

      - run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle :wallet:assembleProdDebug --no-daemon