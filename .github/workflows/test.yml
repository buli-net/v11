name: Build Bitcoin Wallet v11

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout GitLab source
        uses: actions/checkout@v4
        with:
          repository: buli-net/v11-gitlab   # sau khi import từ GitLab
          ref: v11.02
          fetch-depth: 1

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK 34
        uses: android-actions/setup-android@v3

      - name: Build
        run: ./gradlew :wallet:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-v11
          path: wallet/build/outputs/apk/debug/*.apk