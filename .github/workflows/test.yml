name: Build and Release CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v11.04*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Application Package
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js environment (or Java/Flutter depending on your stack)
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Change to yarn/pnpm if applicable

      # 3. Cache dependencies to speed up subsequent workflow runs
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4. Install Dependencies
      - name: Install Project Dependencies
        run: npm ci

      # 5. Run Linter and Static Code Analysis
      - name: Code Quality Linting
        run: npm run lint --if-present

      # 6. Execute Unit Tests
      - name: Run Test Suites
        run: npm test --if-present

      # 7. Compile and Build Production Application Artifacts
      - name: Compile Production Build
        run: npm run build --if-present
        env:
          NODE_ENV: production
          VERSION: "11.04"

      # 8. Persist and upload the build artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-build-v11.04
          path: dist/ # Adjust this path to match your framework's output folder (e.g., build, out, target)
          retention-days: 7