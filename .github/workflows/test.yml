name: Build Bitcoin Wallet - 10.x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: v11.02
          fetch-depth: 1

      # 1) JDK 17 để cài SDK (sdkmanager yêu cầu 17)
      - name: Setup JDK 17 for SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK 30
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-30 build-tools;30.0.3'

      # 2) Hạ xuống JDK 11 để build code cũ
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Fix Guava conflict
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/fix-guava.gradle <<'EOF'
          allprojects {
            configurations.all {
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                force 'com.google.guava:listenablefuture:9999.0-empty-to-avoid-conflict-with-guava'
              }
            }
          }
          EOF

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle :wallet:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wallet-debug-apk
          path: wallet/build/outputs/apk/debug/*.apk