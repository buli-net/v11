name: Build Bitcoin Wallet - 10.x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v11.02
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-30 build-tools;30.0.3'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '6.9.4'

      - name: Fix dependencies
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/fix-deps.gradle <<'EOF'
          allprojects {
            repositories { google(); mavenCentral() }
            configurations.all {
              resolutionStrategy {
                force 'com.google.guava:guava:31.1-android'
                force 'com.google.guava:listenablefuture:9999.0-empty-to-avoid-conflict-with-guava'
                force 'androidx.lifecycle:lifecycle-viewmodel:2.2.0'
                force 'androidx.lifecycle:lifecycle-livedata:2.2.0'
                force 'androidx.lifecycle:lifecycle-common:2.2.0'
                force 'androidx.lifecycle:lifecycle-runtime:2.2.0'
                force 'androidx.arch.core:core-runtime:2.1.0'
                force 'androidx.arch.core:core-common:2.1.0'
              }
            }
            afterEvaluate {
              if (it.hasProperty('android')) {
                android.buildTypes.all {
                  it.minifyEnabled false
                  it.shrinkResources false
                }
              }
            }
          }
          EOF

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle :wallet:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wallet-debug-apk
          path: wallet/build/outputs/apk/debug/*.apk