name: Reproducible Build (Dockerfile style)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ----- SỬ DỤNG JDK 17 ĐỂ CHẠY SDKMANAGER (action setup-android yêu cầu) -----
      - name: Setup JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
          # Mặc định accept license tự động

      # ----- SAU KHI SDK ĐÃ SẴN SÀNG, CHUYỂN SANG JDK 11 ĐỂ BUILD -----
      - name: Setup JDK 11 for build
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # ----- CÀI GRADLE 6.9.4 PHÙ HỢP VỚI PROJECT -----
      - name: Install Gradle 6.9.4
        run: |
          wget https://services.gradle.org/distributions/gradle-6.9.4-bin.zip
          unzip -q gradle-6.9.4-bin.zip -d /opt
          echo "/opt/gradle-6.9.4/bin" >> $GITHUB_PATH
          gradle --version

      # ----- BUILD 2 BẢN RELEASE (HOẶC 4 BẢN) -----
      - name: Build release APKs (assembleRelease)
        run: |
          gradle :wallet:assembleRelease --no-daemon --stacktrace
          # Để build cả 4 loại (devDebug, devRelease, prodDebug, prodRelease) thay dòng trên bằng:
          # gradle :wallet:assembleDevDebug :wallet:assembleDevRelease :wallet:assembleProdDebug :wallet:assembleProdRelease --no-daemon --stacktrace

      - name: List generated APKs
        run: |
          find wallet/build/outputs/apk -name "*.apk" -type f

      - name: Upload unsigned APKs
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-apks
          path: |
            wallet/build/outputs/apk/**/*.apk