name: Build Bitcoin Wallet v11 - All Flavors

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true   # tắt cảnh báo Node 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- B1: JDK 17 để cài SDK (sdkmanager mới cần 17) ----
      - name: Setup JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # dùng cmdline-tools cũ, tương thích với build-tools 28
          cmdline-tools-version: 11076708
          packages: 'platform-tools platforms;android-28 build-tools;28.0.3'

      # ---- B2: Chuyển về JDK 8 để build Gradle 3.1.4 ----
      - name: Switch to JDK 8 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ---- B3: Build cả 3 phiên bản mặc định ----
      - name: Build Prod + Test + Signet (Release)
        run: ./gradlew clean :wallet:assembleProdRelease :wallet:assembleTestRelease :wallet:assembleSignetRelease -x lint --stacktrace

      # ---- B4: Ký bằng key buli.jks của bạn (giữ nguyên như bản bạn đang dùng) ----
      - name: Sign APKs
        env:
          KEYSTORE_BASE64: ${{ secrets.BULI_KEYSTORE }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > buli.jks
          for flavor in prod test signet; do
            IN=wallet/build/outputs/apk/$flavor/release/wallet-$flavor-release.apk
            OUT=wallet-$flavor-v11-signed.apk
            $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
              --ks buli.jks --ks-key-alias buli \
              --ks-pass pass:android --key-pass pass:android \
              --out $OUT $IN
          done

      - name: Upload all 3 APKs
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-v11-all-flavors
          path: wallet-*-v11-signed.apk