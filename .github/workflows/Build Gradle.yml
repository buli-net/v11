name: Build Bitcoin Wallet v11 Signet

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Patch buildscript (giữ nguyên phiên bản gốc)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  mavenCentral()
                  google()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:3.1.4'
                  classpath 'com.android.tools:r8:8.13.17'
                  classpath 'net.sf.proguard:proguard-gradle:6.2.2'
                  classpath('fr.avianey.androidsvgdrawable:gradle-plugin:3.0.2') {
                      exclude group: 'xerces'
                  }
              }
          }
          allprojects {
              repositories {
                  mavenCentral()
                  google()
              }
          }
          EOF

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Signet Debug APK
        run: ./gradlew :wallet:assembleSignetDebug -x lint

      - name: Sign APK với key buli
        env:
          KEYSTORE_BASE64: ${{ secrets.BULI_KEYSTORE }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > buli.jks
          $ANDROID_HOME/build-tools/33.0.2/apksigner sign \
            --ks buli.jks \
            --ks-key-alias buli \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out wallet-signet-signed.apk \
            wallet/build/outputs/apk/signet/debug/wallet-signet-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-wallet-signet-v11
          path: wallet-signet-signed.apk