name: Build v11 - đúng build.gradle của bạn

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Cài Android SDK 28
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip -O tools.zip
          unzip -q tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-28" "build-tools;28.0.3"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Vá lỗi metadata 37.0
        run: |
          find $ANDROID_HOME -name package.xml -exec sed -i 's/\.0<\/api-level>/<\/api-level>/g' {} \;
          find $ANDROID_HOME -name package.xml -exec sed -i '/extension-level/d' {} \;

      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Tạo wrapper đúng version
        run: |
          if [ ! -f ./gradlew ]; then
            wget -q https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
            unzip -q gradle-4.10.3-bin.zip
            ./gradle-4.10.3/bin/gradle wrapper --gradle-version 4.10.3
          fi
          chmod +x gradlew

      - name: Giải mã keystore buli
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo $KEYSTORE_BASE64 | base64 -d > buli.jks

      - name: Build Release + ký
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew clean :wallet:assembleProdRelease :wallet:assembleTestRelease :wallet:assembleSignetRelease -x lint \
            -Pandroid.injected.signing.store.file=$PWD/buli.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Lấy APK
        run: |
          mkdir out
          cp wallet/build/outputs/apk/prod/release/*.apk out/
          cp wallet/build/outputs/apk/test/release/*.apk out/
          cp wallet/build/outputs/apk/signet/release/*.apk out/

      - uses: actions/upload-artifact@v4
        with:
          name: v11-buli-release
          path: out/*.apk