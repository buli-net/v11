name: Build Bitcoin Wallet v11 - Gradle with Docker features

on:
  workflow_dispatch:  # manual trigger only

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # ------------------------------------------------------------------
      # 0. Runner diagnostics (from Docker workflow)
      # ------------------------------------------------------------------
      - name: 0. Print runner info
        run: |
          echo "=== RUNNER INFO ==="
          uname -a
          date -u

      # ------------------------------------------------------------------
      # 1. Checkout full git history for reproducible builds
      # ------------------------------------------------------------------
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0  # needed for commit verification

      - name: 1. Verify commit
        run: |
          git log -1 --pretty=full
          git rev-parse HEAD > commit.txt

      # ------------------------------------------------------------------
      # 2. JDK 11 - required for Room (class version 55) and compatible with AGP 3.1.4
      # ------------------------------------------------------------------
      - uses: actions/setup-java@v5.0.0
        with:
          distribution: temurin
          java-version: '11'

      # ------------------------------------------------------------------
      # 3. Install Android SDK 28 manually (avoid API 37 metadata that breaks AGP 3.1.4)
      # ------------------------------------------------------------------
      - name: 2. Install Android SDK 28
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          # Use old commandline-tools (2020) that doesn't contain API 37
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
          unzip -q commandlinetools-linux-7583922_latest.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-28" "build-tools;28.0.3"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # 4. Patch SDK metadata: AGP 3.1.4 cannot parse <api-level>37.0</api-level> or <extension-level>
      # ------------------------------------------------------------------
      - name: 3. Patch SDK metadata for AGP 3.1.4
        run: |
          find $ANDROID_HOME -name package.xml -exec sed -i 's/\.0<\/api-level>/<\/api-level>/g' {} \;
          find $ANDROID_HOME -name package.xml -exec sed -i '/extension-level/d' {} \;

      - name: 4. Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ------------------------------------------------------------------
      # 5. Ensure correct Gradle wrapper (4.10.3 is required for AGP 3.1.4)
      # ------------------------------------------------------------------
      - name: 5. Setup Gradle wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            wget -q https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
            unzip -q gradle-4.10.3-bin.zip
            ./gradle-4.10.3/bin/gradle wrapper --gradle-version 4.10.3
          fi
          chmod +x gradlew

      # ------------------------------------------------------------------
      # 6. Build APKs unsigned (signing will be done later with apksigner, like Docker flow)
      # ------------------------------------------------------------------
      - name: 6. Build release APKs
        run: |
          unset ANDROID_NDK_HOME  # suppress NDK warning
          ./gradlew clean :wallet:assembleRelease -x lint

      - name: 7. Collect unsigned APKs
        run: |
          mkdir -p out
          # Copy any release APKs produced by Gradle
          find wallet/build/outputs/apk -name "*release*.apk" -exec cp {} out/ \;
          ls -lh out/
          # Store hashes before signing for audit trail
          sha256sum out/*.apk > out/raw-sha256.txt

      # ------------------------------------------------------------------
      # 7. Locate apksigner from build-tools
      # ------------------------------------------------------------------
      - name: 8. Find apksigner
        run: |
          APK=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          echo "APKSIGNER=$APK" >> $GITHUB_ENV
          "$APK" --version

      # ------------------------------------------------------------------
      # 8. Decode keystore and dump certificate info
      # ------------------------------------------------------------------
      - name: 9. Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          keytool -list -v -keystore keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -alias "${{ secrets.KEY_ALIAS }}" | tee keystore-info.txt

      # ------------------------------------------------------------------
      # 9. Sign ALL APKs with private key (Docker-style post-build signing)
      # ------------------------------------------------------------------
      - name: 10. Sign APKs
        run: |
          mkdir -p signed
          for apk in out/*.apk; do
            base=$(basename "$apk" .apk | sed 's/-unsigned//')
            outname="${base}-signed.apk"
            echo "Signing $apk -> $outname"
            "$APKSIGNER" sign \
              --ks keystore.jks \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --out "signed/$outname" "$apk"
          done
          ls -lh signed/

      # ------------------------------------------------------------------
      # 10. Verify signatures and print certificates
      # ------------------------------------------------------------------
      - name: 11. Verify signatures
        run: |
          for apk in signed/*.apk; do
            echo "=== $(basename $apk) ==="
            "$APKSIGNER" verify --verbose --print-certs "$apk"
          done

      # ------------------------------------------------------------------
      # 11. Optional fingerprint check against expected SHA-256
      # ------------------------------------------------------------------
      - name: 12. Authenticity check
        env:
          EXPECTED_SHA256: ${{ secrets.EXPECTED_CERT_SHA256 }}
        run: |
          for apk in signed/*.apk; do
            ACTUAL=$("$APKSIGNER" verify --print-certs "$apk" | grep SHA-256 | awk '{print $NF}' | tr '[:upper:]' '[:lower:]')
            echo "$apk: $ACTUAL"
            if [ -n "$EXPECTED_SHA256" ]; then
              EXP=$(echo "$EXPECTED_SHA256" | tr '[:upper:]' '[:lower:]')
              if [ "$ACTUAL" != "$EXP" ]; then
                echo "❌ Fingerprint mismatch!"; exit 1
              fi
            fi
          done

      # ------------------------------------------------------------------
      # 12. Generate build report
      # ------------------------------------------------------------------
      - name: 13. Generate report
        run: |
          {
            echo "===== Bitcoin Wallet v11 Build Report ====="
            date -u
            echo "Commit: $(cat commit.txt)"
            echo ""
            echo "--- Raw APKs (pre-sign) ---"
            cat out/raw-sha256.txt
            echo ""
            echo "--- Signed APKs ---"
            sha256sum signed/*.apk
          } | tee report.txt

      # ------------------------------------------------------------------
      # 13. Upload artifacts (uses v6 to fix Node 20 warning)
      # ------------------------------------------------------------------
      - name: 14. Upload artifacts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: bitcoin-wallet-v11-signed
          path: |
            signed/*.apk
            report.txt
            keystore-info.txt
            out/raw-sha256.txt