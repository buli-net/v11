name: Build v11 - Release signed by Gradle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 for SDK
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - name: Android SDK 28 (dùng tools cũ)
        uses: android-actions/setup-android@v3
        with:
          # bản 7583922 = trước khi có API 34-37, tránh lỗi 37.0
          cmdline-tools-version: 7583922
          packages: 'platform-tools platforms;android-28 build-tools;28.0.3'

      - name: Patch SDK metadata cho Gradle 3.1.4
        run: |
          # Gradle 3.x không đọc được "37.0" và tag <extension-level>
          find $ANDROID_HOME -name package.xml -type f -exec sed -i 's/\.0<\/api-level>/<\/api-level>/g' {} \;
          find $ANDROID_HOME -name package.xml -type f -exec sed -i 's/<extension-level>.*<\/extension-level>//g' {} \;

      - name: JDK 8 for Gradle
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '8' }

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches,~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Fix gradlew
        run: |
          GRADLEW=$(find . -name gradlew -type f | head -1)
          if [ -z "$GRADLEW" ]; then
            wget -q https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
            unzip -q gradle-4.10.3-bin.zip
            export PATH=$PWD/gradle-4.10.3/bin:$PATH
            gradle wrapper --gradle-version 4.10.3
            GRADLEW=./gradlew
          fi
          chmod +x $GRADLEW
          echo "GRADLEW=$GRADLEW" >> $GITHUB_ENV

      - name: Prepare buli keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo $KEYSTORE_BASE64 | base64 -d > $GITHUB_WORKSPACE/buli.jks

      - name: Build Release + ký luôn
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          $GRADLEW clean \
            :wallet:assembleProdRelease \
            :wallet:assembleTestRelease \
            :wallet:assembleSignetRelease \
            -x lint \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/buli.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Copy APKs
        run: |
          mkdir output
          cp wallet/build/outputs/apk/prod/release/wallet-prod-release.apk output/BitcoinWallet-prod-v11.apk
          cp wallet/build/outputs/apk/test/release/wallet-test-release.apk output/BitcoinWallet-test-v11.apk
          cp wallet/build/outputs/apk/signet/release/wallet-signet-release.apk output/BitcoinWallet-signet-v11.apk

      - uses: actions/upload-artifact@v4
        with:
          name: v11-release-buli
          path: output/*.apk